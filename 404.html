<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Belum Terdaftar - Error 404</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/rGDmv8NN/image-42d8e3bb.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f9;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 550px;
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
        }
        
        /* Ukuran Kotak Animasi 3D Isometrik */
        .animation-box {
            width: 100%;
            max-width: 380px;
            height: auto;
            margin: -20px auto 15px auto;
        }

        /* Gelembung Teks Dialog */
        .speech-bubble {
            position: relative;
            background: #eef2f7;
            border-radius: .4em;
            padding: 18px 20px;
            margin-bottom: 30px;
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            line-height: 1.6;
            border: 1px solid #d5dee7;
        }
        .speech-bubble:after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 0;
            height: 0;
            border: 15px solid transparent;
            border-bottom-color: #eef2f7;
            border-top: 0;
            margin-left: -15px;
            margin-top: -15px;
        }
        
        /* Pembungkus Tombol Aksi */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            display: block;
            text-decoration: none;
            padding: 14px 25px;
            border-radius: 30px;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 15px;
        }
        /* Menyelaraskan warna tombol WA */
        .btn-whatsapp {
            background-color: #25d366;
            color: white;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.25);
        }
        .btn-whatsapp:hover {
            background-color: #20ba5a;
            transform: translateY(-2px);
        }
        /* Menyelaraskan warna tombol utama dengan aksen merah 404 Isometrik */
        .btn-primary {
            background-color: #e74c3c;
            color: white;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.25);
        }
        .btn-primary:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
        }

        /* Tampilan Tombol Sejajar di HP Lebar / Laptop */
        @media (min-width: 480px) {
            .btn-group {
                flex-direction: row;
                justify-content: center;
            }
            .btn {
                flex: 1;
                max-width: 220px;
            }
        }
    </style>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>
<body>

    <div class="container">
        
        <div class="animation-box">
            <lottie-player 
                src="animasi404.json" 
                background="transparent" 
                speed="1" 
                style="width: 100%; height: 100%;" 
                loop 
                autoplay>
            </lottie-player>
        </div>

        <div class="speech-bubble">
            "Kita udah nyari apa yang kamu mau, tapi halaman AC ini belum terdaftar di kami!"
        </div>
        
        <div class="btn-group">
            <a href="https://wa.me/6285817818216" target="_blank" class="btn btn-whatsapp">Hubungi WhatsApp</a>
            <a href="/" class="btn btn-primary">Balik ke Menu Utama</a>
        </div>
    </div>

</body>
</html>
