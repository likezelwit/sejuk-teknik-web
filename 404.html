<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Tidak Ditemukan - Error 404</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 500px;
            background: white;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .icon {
            font-size: 80px;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }
        h1 {
            font-size: 72px;
            color: #e74c3c;
            line-height: 1;
            margin-bottom: 10px;
        }
        h2 {
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        p {
            font-size: 15px;
            color: #7f8c8d;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s ease;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }
        .btn:hover {
            background-color: #2980b9;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Ikon AC Berasap/Error (Bisa diganti emoji lain) -->
        <div class="icon">💨🛠️</div>
        <h1>404</h1>
        <h2>Waduh, Halamannya Kurang Dingin!</h2>
        <p>Sepertinya tautan yang Anda cari sudah 'bocor' atau salah ketik. Tenang, jangan biarkan ruangan Anda ikut panas. Mari kembali ke halaman utama kami.</p>
        
        <!-- Tombol untuk kembali ke Beranda -->
        <a href="/" class="btn">Kembali ke Beranda AC</a>
    </div>

</body>
</html>
